<!doctype html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Reportes</title>

  <!-- BULMA -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <link rel="stylesheet"
    href="archivos/css/style.css">

 <style>
  body {
    background-color: #ffffff;
    min-height: 100vh;
    color: #000000;
  }

  /* NAVBAR */
  .navbar {
    background-color: #d6eaf8;
  }

  /* SIDEBAR */
  .sidebar {
    width: 270px;
    height: 100vh;
    background-color: #ffffff; /* CAMBIADO A BLANCO */
    position: fixed;
    top: 0;
    left: -280px;
    transition: 0.3s;
    z-index: 1000;
    padding: 20px;
    overflow-y: auto;
  }

  .sidebar.active {
    left: 0;
  }

  /* OVERLAY */
  .overlay {
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    position: fixed;
    top: 0;
    left: 0;
    display: none;
    z-index: 999;
  }

  .overlay.active {
    display: block;
  }

  .menu-btn {
    cursor: pointer;
  }

  /* PERFIL */
  .profile-img {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background-color: white;
  }

  /* INPUT */
  .input {
    border: 1px solid gray;
    color: black;
    background-color: #ffffff; /* INPUTS BLANCOS */
  }

  /* TITULOS */
  .filter-title {
    background-color: #0b5ed7;
    color: white;
    border-radius: 15px;
    padding: 6px;
    text-align: center;
    margin-bottom: 10px;
  }

  /* TABLA */
  table {
    width: 100%;
    background-color: #ffffff; /* TABLA BLANCA */
  }

  .table {
    background-color: #ffffff;
  }

  .table td,
  .table th {
    background-color: #ffffff; /* CELDAS BLANCAS */
    color: black;
  }

  thead tr:first-child th {
    background-color: #00bcd4 !important;
    color: white !important;
  }

  thead tr:last-child th {
    background-color: #e0f2f1 !important;
    color: black !important;
  }

  /* BOTONES */
  .button.is-primary,
  .button.is-danger,
  .button.is-info {
    color: white !important;
  }
</style>

</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar"
    id="sidebar">

    <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">

      <h4 class="title is-5">
        Menú Principal
      </h4>

      <button class="delete"
        onclick="toggleSidebar()"></button>

    </div>

    <div class="buttons are-fullwidth">

      <a href="perfil.html"
        class="button is-primary is-justify-content-flex-start">

        <img src="/archivos/IMG/personita.webp"
          style="width:25px; height:25px; margin-right:10px;">

        Perfil

      </a>

      <a href="altabajauser.html"
        class="button is-primary is-justify-content-flex-start">

        <img src="/archivos/IMG/users.png"
          style="width:25px; height:25px; margin-right:10px;">

        Alta o baja de usuarios

      </a>

      <a href="inscripcion.html"
        class="button is-primary is-justify-content-flex-start">

        <img src="/archivos/IMG/inscripcion.png"
          style="width:25px; height:25px; margin-right:10px;">

        Inscripción

      </a>

      <!-- ACTIVO -->
      <a href="reportes.html"
        class="button is-info is-justify-content-flex-start">

        <img src="/archivos/IMG/reportes.webp"
          style="width:25px; height:25px; margin-right:10px;">

        Generar Reportes

      </a>

      <a href="periodo.html"
        class="button is-primary is-justify-content-flex-start">

        <img src="/archivos/IMG/periodo escolar.png"
          style="width:25px; height:25px; margin-right:10px;">

        Periodos Escolares

      </a>

      <hr>

      <a href="../../index.html"
        class="button is-danger is-justify-content-flex-start">

        <img src="/archivos/IMG/cerrar sesión.png"
          style="width:25px; height:25px; margin-right:10px;">

        Cerrar Sesión

      </a>

    </div>

  </div>

  <!-- OVERLAY -->
  <div class="overlay"
    id="overlay"
    onclick="toggleSidebar()"></div>

  <!-- NAVBAR -->
  <nav class="navbar px-4 py-3">

    <div class="navbar-brand">

      <a class="navbar-item menu-btn"
        onclick="toggleSidebar()">

        <img src="/archivos/IMG/menu.png"
          style="width:25px; height:25px;">

      </a>

    </div>

    <div class="navbar-menu is-active">

      <div class="navbar-end is-align-items-center">

        <!-- SEARCH -->
        <div class="navbar-item">

          <div class="field has-addons">

            <div class="control">

              <input class="input"
                type="search"
                placeholder="Search">

            </div>

            <div class="control">

              <button class="button is-success">

                Search

              </button>

            </div>

          </div>

        </div>

        <!-- PERFIL -->
        <div class="navbar-item">

          <a href="perfil.html">

            <img src="/archivos/IMG/personita.webp"
              class="profile-img">

          </a>

        </div>

      </div>

    </div>

  </nav>

  <!-- CONTENIDO -->
  <section class="section">

    <div class="container">

      <!-- FILTROS -->
      <div class="columns has-text-centered">

        <div class="column">

          <h5 class="filter-title">
            PERIODO ESCOLAR
          </h5>

          <input type="text"
            class="input">

        </div>

        <div class="column">

          <h5 class="filter-title">
            TIPO DE REPORTE
          </h5>

          <input type="text"
            class="input">

        </div>

      </div>

      <br><br>

      <!-- TABLA -->
      <table class="table is-bordered is-fullwidth has-text-centered">

        <thead>

          <tr>

            <th colspan="2">
              GENERAR REPORTES
            </th>

          </tr>

          <tr>

            <th>
              NOMBRE
            </th>

            <th>
              TITULO
            </th>

          </tr>

        </thead>

        <tbody>

          <tr>
            <td></td>
            <td></td>
          </tr>

          <tr>
            <td></td>
            <td></td>
          </tr>

          <tr>
            <td></td>
            <td></td>
          </tr>

        </tbody>

      </table>

      <br><br>

      <!-- BOTONES -->
      <div class="has-text-centered">

        <a href="/roles/Administrativos/reporte/generareporte.html"
          class="button is-primary mx-2">

          <b>
            GENERAR<br>REPORTE
          </b>

        </a>

        <a href="/roles/Administrativos/reporte/modificareporte.html"
          class="button is-light mx-2"
          style="border:2px solid black;">

          <b>
            MODIFICAR<br>REPORTE
          </b>

        </a>

        <a href="/roles/Administrativos/reporte/eliminareporte.html"
          class="button is-primary mx-2">

          <b>
            ELIMINAR REPORTE
          </b>

        </a>

      </div>

    </div>

  </section>

  <!-- SCRIPT -->
  <script>

    function toggleSidebar() {

      document.getElementById("sidebar")
        .classList.toggle("active");

      document.getElementById("overlay")
        .classList.toggle("active");
    }

  </script>

</body>

</html>
