<!doctype html>
<html lang="es">

<head>

  <!-- BULMA -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <link rel="stylesheet"
    href="archivos/css/style.css">

  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Alta Usuario</title>

  <style>

    html,
    body{
      background-color: white;
      color: black;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    /* NAVBAR */
    .navbar-custom{
      background-color: #d6eaf8;
      padding: 10px 20px;
    }

    /* SIDEBAR */
    .sidebar{
      width: 280px;
      height: 100vh;
      background-color: white;
      position: fixed;
      top: 0;
      left: -300px;
      transition: 0.3s;
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
      box-shadow: 2px 0px 10px rgba(0,0,0,0.1);
    }

    .sidebar.active{
      left: 0;
    }

    /* OVERLAY */
    .overlay{
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      position: fixed;
      top: 0;
      left: 0;
      display: none;
      z-index: 999;
    }

    .overlay.active{
      display: block;
    }

    /* PERFIL */
    .perfil{
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: white;
      margin-left: 15px;
    }

    /* INPUTS */
    .input,
    .select select{
      border: 2px solid black !important;
      border-radius: 20px !important;
      background-color: white !important;
      color: black !important;
    }

    /* SEARCH */
    .search-input{
      border: 1px solid #ccc !important;
      border-radius: 8px !important;
    }

    /* TITULO */
    .titulo{
      background-color: blue;
      color: white;
      padding: 10px;
      font-weight: bold;
      width: 80%;
      margin: auto;
    }

    /* LETRAS */
    h1,h2,h3,h4,h5,h6,p,label,span,a,b{
      color: black;
    }

    /* BOTON */
    .boton-alta{
      padding: 12px 50px;
      font-weight: bold;
    }

  </style>

</head>

<body>

  <!-- OVERLAY -->
  <div class="overlay"
    id="overlay"></div>

  <!-- MENU LATERAL -->
  <div class="sidebar"
    id="sidebar">

    <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">

      <h5 class="title is-5">
        Menú Principal
      </h5>

      <button class="delete"
        id="closeMenu"></button>

    </div>

    <div class="buttons">

      <a href="perfil.html"
        class="button is-link is-fullwidth is-justify-content-flex-start">

        <img src="/archivos/IMG/personita.webp"
          alt=""
          style="width: 25px; height: 25px; margin-right: 10px;">

        Perfil

      </a>

      <!-- ACTIVO -->
      <a href="altabajauser.html"
        class="button is-info is-fullwidth has-text-white has-text-weight-bold is-justify-content-flex-start">

        <img src="/archivos/IMG/users.png"
          alt=""
          style="width: 25px; height: 25px; margin-right: 10px;">

        Alta o baja de usuarios

      </a>

      <a href="inscripcion.html"
        class="button is-link is-fullwidth is-justify-content-flex-start">

        <img src="/archivos/IMG/inscripcion.png"
          alt=""
          style="width: 25px; height: 25px; margin-right: 10px;">

        Inscripción

      </a>

      <a href="reportes.html"
        class="button is-link is-fullwidth is-justify-content-flex-start">

        <img src="/archivos/IMG/reportes.webp"
          alt=""
          style="width: 25px; height: 25px; margin-right: 10px;">

        Reportes

      </a>

      <a href="periodo.html"
        class="button is-link is-fullwidth is-justify-content-flex-start">

        <img src="/archivos/IMG/periodo escolar.png"
          alt=""
          style="width: 25px; height: 25px; margin-right: 10px;">

        Periodo Escolar

      </a>

      <hr>

      <a href="../../index.html"
        class="button is-danger is-fullwidth is-justify-content-flex-start">

        <img src="/archivos/IMG/cerrar sesión.png"
          alt=""
          style="width: 25px; height: 25px; margin-right: 10px;">

        Cerrar Sesión

      </a>

    </div>

  </div>

  <!-- NAVBAR -->
  <nav class="navbar navbar-custom">

    <div class="navbar-brand">

      <button class="button is-link"
        id="openMenu">

        <img src="/archivos/IMG/menu.png"
          alt=""
          style="width: 25px; height: 25px;">

      </button>

    </div>

    <div class="navbar-end is-flex is-align-items-center">

      <form class="is-flex">

        <input class="input search-input mr-2"
          type="search"
          placeholder="Search">

        <button class="button is-success has-background-white has-text-black"
          type="submit">

          Search

        </button>

      </form>

      <a href="perfil.html">

        <img src="/archivos/IMG/personita.webp"
          alt=""
          class="perfil">

      </a>

    </div>

  </nav>

  <!-- CONTENIDO -->
  <div class="container mt-6">

    <!-- TITULO -->
    <div class="has-text-centered">

      <h3 class="titulo">

        ALTA USUARIO

      </h3>

    </div>

    <br><br>

    <!-- FORMULARIO -->
    <div style="width: 90%; margin: auto;">

      <!-- FILA 1 -->
      <div class="columns">

        <div class="column">

          <h5 class="mb-2">
            NOMBRE(S)
          </h5>

          <input type="text"
            class="input">

        </div>

        <div class="column">

          <h5 class="mb-2">
            APELLIDOS
          </h5>

          <input type="text"
            class="input">

        </div>

        <div class="column">

          <h5 class="mb-2">
            CURP
          </h5>

          <input type="text"
            class="input">

        </div>

      </div>

      <!-- FILA 2 -->
      <div class="columns">

        <div class="column">

          <h5 class="mb-2">
            DIRECCIÓN
          </h5>

          <input type="text"
            class="input">

        </div>

        <div class="column">

          <h5 class="mb-2">
            CORREO ELECTRÓNICO
          </h5>

          <input type="email"
            class="input">

        </div>

        <div class="column">

          <h5 class="mb-2">
            TELÉFONO
          </h5>

          <input type="text"
            class="input">

        </div>

      </div>

      <!-- FILA 3 -->
      <div class="columns">

        <div class="column is-4">

          <h5 class="mb-2">
            TIPO DE USUARIO
          </h5>

          <div class="select is-fullwidth mb-3">

            <select>

              <option>
                ESTUDIANTE
              </option>

              <option>
                DOCENTE
              </option>

            </select>

          </div>

          <input type="text"
            class="input mb-3"
            disabled>

          <input type="text"
            class="input"
            disabled>

        </div>

        <div class="column is-4"></div>

        <div class="column is-4 has-text-centered">

          <br><br><br>

          <a href="/roles/Administrativos/altabajauser.html"
            class="button is-link boton-alta">

            DAR DE ALTA

          </a>

        </div>

      </div>

    </div>

  </div>

  <!-- SCRIPT -->
  <script>

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");

    document.getElementById("openMenu").addEventListener("click", () => {
      sidebar.classList.add("active");
      overlay.classList.add("active");
    });

    document.getElementById("closeMenu").addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });

    overlay.addEventListener("click", () => {
      sidebar.classList.remove("active");
      overlay.classList.remove("active");
    });

  </script>

</body>

</html>
