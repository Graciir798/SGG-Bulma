<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Vista de perfil de admin</title>

  <!-- BULMA -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

  <link rel="stylesheet" href="archivos/css/style.css">

  <style>
    body {
      background-color: white;
      color: black;
      min-height: 100vh;
    }

    /* NAVBAR */
    .navbar-custom {
      background-color: #d6eaf8;
      padding: 10px 20px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 270px;
      height: 100vh;
      background-color: #f5f5f5;
      position: fixed;
      top: 0;
      left: -280px;
      transition: 0.3s;
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar.active {
      left: 0;
    }

    /* OVERLAY */
    .overlay {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      position: fixed;
      top: 0;
      left: 0;
      display: none;
      z-index: 999;
    }

    .overlay.active {
      display: block;
    }

    .menu-btn {
      cursor: pointer;
    }

    /* BOTONES MENU */
    .menu-link {
      margin-bottom: 10px;
      justify-content: flex-start;
      color: white !important;
    }

    .menu-active {
      background-color: #3ec5ff !important;
      color: white !important;
      font-weight: bold;
    }

    /* TARJETAS */
    .card-custom {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      height: 100%;
      color: black;
    }

    /* TEXTO NEGRO */
    .title,
    .subtitle,
    p,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    strong {
      color: black !important;
    }

    /* PERFIL */
    .profile-img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .perfil-grande {
      width: 100%;
      max-width: 350px;
      height: auto;
      border-radius: 10px;
    }

    /* INPUT */
    .input {
      color: rgb(247, 244, 244);
    }
  </style>
</head>

<body>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <h4 class="title is-5 has-text-black">Menú Principal</h4>
    <hr>

    <a href="perfil.html" class="button is-info menu-link menu-active is-fullwidth">
      <img src="/archivos/IMG/personita.webp"
        style="width:25px; height:25px; margin-right:10px;">
      Perfil
    </a>

    <a href="altabajauser.html" class="button is-primary menu-link is-fullwidth">
      <img src="/archivos/IMG/users.png"
        style="width:25px; height:25px; margin-right:10px;">
      Alta o baja de usuarios
    </a>

    <a href="inscripcion.html" class="button is-primary menu-link is-fullwidth">
      <img src="/archivos/IMG/inscripcion.png"
        style="width:25px; height:25px; margin-right:10px;">
      Inscripción
    </a>

    <a href="reportes.html" class="button is-primary menu-link is-fullwidth">
      <img src="/archivos/IMG/reportes.webp"
        style="width:25px; height:25px; margin-right:10px;">
      Reportes
    </a>

    <a href="periodo.html" class="button is-primary menu-link is-fullwidth">
      <img src="/archivos/IMG/periodo escolar.png"
        style="width:25px; height:25px; margin-right:10px;">
      Periodo Escolar
    </a>

    <hr>

    <a href="../../index.html" class="button is-danger menu-link is-fullwidth">
      <img src="/archivos/IMG/cerrar sesión.png"
        style="width:25px; height:25px; margin-right:10px;">
      Cerrar Sesión
    </a>
  </div>

  <!-- NAVBAR -->
 <!-- NAVBAR -->
<nav class="navbar navbar-custom">

  <div class="navbar-brand">

    <button class="button is-primary menu-btn" onclick="openSidebar()">
      <img src="/archivos/IMG/menu.png"
        style="width:25px; height:25px;">
    </button>

  </div>

  <div class="navbar-menu is-active">

    <div class="navbar-end">

      <div class="navbar-item">
        <form style="display:flex; gap:10px;">

          <!-- SEARCH EN BLANCO -->
          <input 
            class="input"
            type="search"
            placeholder="Search"
            style="
              background-color: white;
              color: black;
              border: 1px solid #b5b5b5;
            "
          >

          <button class="button is-success has-text-white">
            Search
          </button>

        </form>
      </div>

      <div class="navbar-item">
        <a href="perfil.html">
          <img src="/archivos/IMG/personita.webp"
            class="profile-img">
        </a>
      </div>

    </div>
  </div>
</nav>

  <!-- TITULO -->
  <section class="section pt-4 pb-2">
    <div class="container">
      <h2 class="title has-text-centered">
        ¡BIENVENIDA!
      </h2>
      <hr>
    </div>
  </section>

  <!-- CONTENIDO -->
  <section class="section pt-2">
    <div class="container">

      <div class="columns is-centered is-variable is-5">

        <!-- DATOS -->
        <div class="column is-6">

          <div class="card-custom">

            <h5 class="title is-5">Nombre</h5>
            <p>Ellie Williams</p>

            <br>

            <h5 class="title is-5">Correo institucional</h5>
            <p>admin@itvh.edu.mx</p>

            <br>

            <h5 class="title is-5">Matrícula</h5>
            <p>GodW123</p>

          </div>

        </div>

        <!-- IMAGEN -->
        <div class="column is-4">

          <div class="card-custom has-text-centered">

            <img src="/archivos/IMG/ellie.webp"
              class="perfil-grande">

          </div>

        </div>

      </div>

    </div>
  </section>

  <!-- SCRIPT -->
  <script>
    function openSidebar() {
      document.getElementById("sidebar").classList.add("active");
      document.getElementById("overlay").classList.add("active");
    }

    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("active");
      document.getElementById("overlay").classList.remove("active");
    }
  </script>

</body>
</html>
