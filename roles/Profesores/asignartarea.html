  <!doctype html>
  <html lang="es">

  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <!-- BULMA -->
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

      <!-- CSS -->
      <link rel="stylesheet" href="archivos/css/style.css">

      <title>Vista de perfil de alumno</title>

      <style>
          body {
              background-color: #ffffff;
              min-height: 100vh;
          }

          /* SIDEBAR */
          .sidebar {
              width: 260px;
              height: 100vh;
              background-color: #f5f5f5;
              position: fixed;
              left: -270px;
              top: 0;
              transition: 0.3s;
              z-index: 1000;
              padding: 20px;
              overflow-y: auto;
          }

          .sidebar.active {
              left: 0;
          }

          .overlay {
              width: 100%;
              height: 100%;
              position: fixed;
              background: rgba(0, 0, 0, 0.4);
              top: 0;
              left: 0;
              display: none;
              z-index: 999;
          }

          .overlay.active {
              display: block;
          }

          .menu-btn {
              cursor: pointer;
          }

          .content {
              padding: 30px;
          }

          .navbar {
              background-color: #d6eaf8;
          }
      </style>
  </head>

  <body>

      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">

          <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
              <h4 class="title is-5">Menú Principal</h4>
              <button class="delete" onclick="toggleSidebar()"></button>
          </div>

          <div class="buttons are-fullwidth">

              <a href="perfil.html" class="button is-primary is-justify-content-flex-start">
                  <img src="/archivos/IMG/personita.webp" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Perfil
              </a>

              <a href="materias.html" class="button is-primary is-justify-content-flex-start">
                  <img src="/archivos/IMG/reportes.webp" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Materias
              </a>

              <a href="calificacion.html" class="button is-primary is-justify-content-flex-start">
                  <img src="/archivos/IMG/inscripcion.png" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Calificación
              </a>

              <a href="observaciones.html" class="button is-primary is-justify-content-flex-start">
                  <img src="/archivos/IMG/periodo escolar.png" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Observaciones
              </a>

              <a href="tareas.html" class="button is-info is-justify-content-flex-start">
                  <img src="/archivos/IMG/periodo escolar.png" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Tareas
              </a>

              <a href="alumnos.html" class="button is-primary is-justify-content-flex-start">
                  <img src="/archivos/IMG/users.png" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Alumnos
              </a>

              <hr>

              <a href="../../index.html" class="button is-danger is-justify-content-flex-start">
                  <img src="/archivos/IMG/cerrar sesión.png" alt=""
                      style="width:25px; height:25px; margin-right:10px;">
                  Cerrar Sesión
              </a>

          </div>
      </div>

      <!-- OVERLAY -->
      <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

      <!-- NAVBAR -->
      <nav class="navbar px-4 py-3">

          <div class="navbar-brand">

              <a class="navbar-item menu-btn" onclick="toggleSidebar()">
                  <img src="/archivos/IMG/menu.png" alt=""
                      style="width:25px; height:25px;">
              </a>

          </div>

          <div class="navbar-menu is-active">

              <div class="navbar-end is-align-items-center">

                  <!-- SEARCH -->
                     <div class="navbar-item">

    <form>
        <div class="field has-addons">

            <div class="control">
                <input class="input has-background-white has-text-black"
                    type="search"
                    placeholder="Search">
            </div>

            <div class="control">
                <button class="button is-success">
                    Search
                </button>
            </div>

        </div>
    </form>

</div>
                  <!-- PERFIL -->
                  <div class="navbar-item">
                      <a href="perfil.html">
                          <img src="/archivos/IMG/personita.webp" alt=""
                              style="width:50px; height:50px;">
                      </a>
                  </div>

              </div>

          </div>

      </nav>

      <!-- CONTENIDO -->
      <section class="section">
          <div class="container">

              <h1 class="title has-text-centered">
                  Subir nueva Asignación
              </h1>

              <form>

                <!-- TITULO -->
<div class="field">

    <label class="label has-text-black">
        Título de Actividad
    </label>

    <div class="control">

        <textarea
            class="textarea has-background-white has-text-black"
            placeholder="Ingresa una nueva actividad"></textarea>

    </div>

</div>

<!-- INSTRUCCIONES -->
<div class="field">

    <label class="label has-text-black">
        Instrucciones
    </label>

    <div class="control">

        <textarea
            class="textarea has-background-white has-text-black"
            placeholder="Ingresa las instrucciones"></textarea>

    </div>

</div>

<!-- ARCHIVO -->
<div class="field">

    <label class="label has-text-black">
        Subir Archivo
    </label>

    <div class="control">

        <input
            class="input has-background-white has-text-black"
            type="file">

    </div>

</div>

<!-- FECHA -->
<div class="field">

    <label class="label has-text-black">
        Selecciona Fecha y Hora
    </label>

    <div class="control">

        <input
            class="input has-background-white has-text-black"
            type="datetime-local">

    </div>

</div>
                  <!-- BOTON -->
                  <div class="field mt-5">
                      <div class="control">
                          <button type="button"
                              class="button is-success is-fullwidth"
                              onclick="window.location.href='/roles/Profesores/tareas.html'">

                              Subir actividad

                          </button>
                      </div>
                  </div>

              </form>

          </div>
      </section>

      <!-- SCRIPT -->
      <script>
          function toggleSidebar() {
              document.getElementById("sidebar").classList.toggle("active");
              document.getElementById("overlay").classList.toggle("active");
          }
      </script>

  </body>

  </html>
