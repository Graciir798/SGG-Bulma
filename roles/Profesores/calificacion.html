<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BULMA -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <title>Calificaciones</title>

    <style>
        body {
            background-color: #ffffff;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background-color: #d6eaf8;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: #f5f5f5;
            position: fixed;
            left: -270px;
            top: 0;
            transition: 0.3s;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        .overlay {
            width: 100%;
            height: 100%;
            position: fixed;
            background: rgba(0, 0, 0, 0.4);
            top: 0;
            left: 0;
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .menu-btn {
            cursor: pointer;
        }

        /* TABLA */
        .table {
            background-color: #ffffff !important;
        }

        .table th,
        .table td {
            color: #000 !important;
            border: 1px solid #dcdcdc;
        }

        .table tbody tr:hover {
            background-color: #f5f5f5;
        }

        /* TITULO */
        .title {
            color: #000;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
            <h4 class="title is-5">Menú Principal</h4>

            <button class="delete"
                onclick="toggleSidebar()"></button>
        </div>

        <div class="buttons are-fullwidth">

            <a href="perfil.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/personita.webp"
                    style="width:25px; height:25px; margin-right:10px;">

                Perfil
            </a>

            <a href="materias.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/reportes.webp"
                    style="width:25px; height:25px; margin-right:10px;">

                Materias
            </a>

            <a href="calificacion.html"
                class="button is-info is-justify-content-flex-start">

                <img src="/archivos/IMG/inscripcion.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Calificación
            </a>

            <a href="observaciones.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/periodo escolar.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Observaciones
            </a>

            <a href="tareas.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/periodo escolar.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Tareas
            </a>

            <a href="alumnos.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/users.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Alumnos
            </a>

            <hr>

            <a href="../../index.html"
                class="button is-danger is-justify-content-flex-start">

                <img src="/archivos/IMG/cerrar sesión.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Cerrar Sesión
            </a>

        </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay"
        id="overlay"
        onclick="toggleSidebar()"></div>

    <!-- NAVBAR -->
    <nav class="navbar px-4 py-3">

        <div class="navbar-brand">

            <a class="navbar-item menu-btn"
                onclick="toggleSidebar()">

                <img src="/archivos/IMG/menu.png"
                    style="width:25px; height:25px;">
            </a>

        </div>

        <div class="navbar-menu is-active">

            <div class="navbar-end is-align-items-center">

                <!-- BUSCADOR -->
               <div class="navbar-item">

    <form>
        <div class="field has-addons">

            <div class="control">
                <input class="input has-background-white has-text-black"
                    type="search"
                    placeholder="Search">
            </div>

            <div class="control">
                <button class="button is-success">
                    Search
                </button>
            </div>

        </div>
    </form>

</div>
                <!-- PERFIL -->
                <div class="navbar-item">

                    <a href="perfil.html">
                        <img src="/archivos/IMG/personita.webp"
                            style="width:50px; height:50px;">
                    </a>

                </div>

            </div>

        </div>

    </nav>

    <!-- CONTENIDO -->
    <section class="section">

        <div class="container">

            <h1 class="title has-text-centered is-1">
                CALIFICACIONES
            </h1>

            <br>

            <!-- BOTON -->
            <button class="button is-success"
                onclick="agregar()">

                Añadir calificación

            </button>

            <br><br>

            <!-- TABLA -->
            <div class="table-container">

                <table class="table is-fullwidth is-bordered">

                    <thead>
                        <tr>
                            <th>Alumno</th>
                            <th>Materia</th>
                            <th>Calificación</th>
                            <th>Opciones</th>
                        </tr>
                    </thead>

                    <tbody id="tablaDatos">

                        <tr>
                            <td>Leon Kennedy</td>
                            <td>Robótica</td>
                            <td>100</td>

                            <td>
                                <button class="button is-link"
                                    onclick="editar(this)">

                                    Modificar

                                </button>
                            </td>
                        </tr>

                        <tr>
                            <td>Dina</td>
                            <td>Cálculo</td>
                            <td>90</td>

                            <td>
                                <button class="button is-link"
                                    onclick="editar(this)">

                                    Modificar

                                </button>
                            </td>
                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </section>

    <!-- JAVASCRIPT -->
    <script>

        // SIDEBAR
        function toggleSidebar() {
            document.getElementById("sidebar")
                .classList.toggle("active");

            document.getElementById("overlay")
                .classList.toggle("active");
        }

        // AGREGAR FILA
        function agregar() {

            var nombre = prompt("Escribe el nombre del alumno:");
            var materia = prompt("Escribe la materia:");
            var calificacion = prompt("Escribe la calificación:");

            if (nombre != null &&
                materia != null &&
                calificacion != null) {

                var tabla =
                    document.getElementById("tablaDatos");

                tabla.innerHTML +=

                    "<tr>" +
                    "<td>" + nombre + "</td>" +
                    "<td>" + materia + "</td>" +
                    "<td>" + calificacion + "</td>" +

                    "<td>" +

                    "<button class='button is-link' onclick='editar(this)'>" +

                    "Modificar" +

                    "</button>" +

                    "</td>" +

                    "</tr>";
            }
        }

        // EDITAR CALIFICACION
        function editar(botonPresionado) {

            var fila =
                botonPresionado.parentNode.parentNode;

            var nombreAlumno =
                fila.cells[0].innerHTML;

            var calificacionActual =
                fila.cells[2].innerHTML;

            var nueva =
                prompt(
                    "Modificar calificación para " +
                    nombreAlumno + ":",
                    calificacionActual
                );

            if (nueva != null &&
                nueva != "") {

                fila.cells[2].innerHTML = nueva;
            }
        }

    </script>

</body>

</html>
