<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BULMA -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <link rel="stylesheet" href="archivos/css/style.css">

    <title>Vista de perfil de alumno</title>

    <style>

        body {
            background-color: #ffffff;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background-color: #d6eaf8;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: #f5f5f5;
            position: fixed;
            left: -270px;
            top: 0;
            transition: 0.3s;
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .sidebar.active {
            left: 0;
        }

        /* OVERLAY */
        .overlay {
            width: 100%;
            height: 100%;
            position: fixed;
            background: rgba(0, 0, 0, 0.4);
            top: 0;
            left: 0;
            display: none;
            z-index: 999;
        }

        .overlay.active {
            display: block;
        }

        .menu-btn {
            cursor: pointer;
        }

        /* INPUT */
        .input {
            background-color: #ffffff !important;
            color: #000000 !important;
        }

        /* TARJETAS */
        .card-custom {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
            height: 100%;
        }

        .card-custom img {
            width: 100px;
            height: 100px;
            margin-bottom: 15px;
        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">

        <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">

            <h4 class="title is-5">
                Menú Principal
            </h4>

            <button class="delete"
                onclick="toggleSidebar()"></button>

        </div>

        <div class="buttons are-fullwidth">

            <a href="perfil.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/personita.webp"
                    style="width:25px; height:25px; margin-right:10px;">

                Perfil
            </a>

            <a href="materias.html"
                class="button is-info is-justify-content-flex-start">

                <img src="/archivos/IMG/reportes.webp"
                    style="width:25px; height:25px; margin-right:10px;">

                Materias
            </a>

            <a href="calificacion.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/inscripcion.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Calificación
            </a>

            <a href="observaciones.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/periodo escolar.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Observaciones
            </a>

            <a href="tareas.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/periodo escolar.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Tareas
            </a>

            <a href="alumnos.html"
                class="button is-primary is-justify-content-flex-start">

                <img src="/archivos/IMG/users.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Alumnos
            </a>

            <hr>

            <a href="../../index.html"
                class="button is-danger is-justify-content-flex-start">

                <img src="/archivos/IMG/cerrar sesión.png"
                    style="width:25px; height:25px; margin-right:10px;">

                Cerrar Sesión
            </a>

        </div>

    </div>

    <!-- OVERLAY -->
    <div class="overlay"
        id="overlay"
        onclick="toggleSidebar()"></div>

    <!-- NAVBAR -->
    <nav class="navbar px-4 py-3">

        <!-- MENU -->
        <div class="navbar-brand">

            <a class="navbar-item menu-btn"
                onclick="toggleSidebar()">

                <img src="/archivos/IMG/menu.png"
                    style="width:25px; height:25px;">

            </a>

        </div>

        <!-- DERECHA -->
        <div class="navbar-menu is-active">

            <div class="navbar-end is-align-items-center">

                <!-- BUSCADOR -->
                <div class="navbar-item">

                    <form>

                        <div class="field has-addons">

                            <div class="control">

                                <input
                                    class="input"
                                    type="search"
                                    placeholder="Search">

                            </div>

                            <div class="control">

                                <button class="button is-success">
                                    Search
                                </button>

                            </div>

                        </div>

                    </form>

                </div>

                <!-- PERFIL -->
                <div class="navbar-item">

                    <a href="perfil.html">

                        <img src="/archivos/IMG/personita.webp"
                            style="width:50px; height:50px;">

                    </a>

                </div>

            </div>

        </div>

    </nav>

    <!-- TARJETAS -->
    <section class="section has-background-white">

        <div class="container">

            <div class="columns is-multiline">

                <!-- INGLES -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/english icon.png">

                        <h5 class="title is-5">
                            Inglés
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

                <!-- MATEMATICAS -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/math.png">

                        <h5 class="title is-5">
                            Matemáticas
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea2.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

                <!-- PROGRAMACION -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/programación.png">

                        <h5 class="title is-5">
                            Programación
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea3.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

                <!-- ETICA -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/Ética.png">

                        <h5 class="title is-5">
                            Ética
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea4.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

                <!-- CALCULO -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/Cálculo.png">

                        <h5 class="title is-5">
                            Cálculo
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea5.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

                <!-- DISEÑO -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/Diseño.png">

                        <h5 class="title is-5">
                            Diseño
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea6.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

                <!-- ADMINISTRACION -->
                <div class="column is-3">

                    <div class="card-custom">

                        <img src="/archivos/IMG/administración.webp">

                        <h5 class="title is-5">
                            Administración
                        </h5>

                        <a href="/roles/Profesores/canal de tareas/canaltarea7.html"
                            class="button is-primary">
                            Ver
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <!-- SCRIPT -->
    <script>

        function toggleSidebar() {

            document.getElementById("sidebar")
                .classList.toggle("active");

            document.getElementById("overlay")
                .classList.toggle("active");

        }

    </script>

</body>

</html>
